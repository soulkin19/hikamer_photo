<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zero Fighter 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-family: sans-serif; pointer-events: none; }
        .menu { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 20px; text-align: center;
            pointer-events: auto; border-radius: 10px; z-index: 100;
        }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="start-menu" class="menu">
    <h1>零戦 3D - 武装選択</h1>
    <button onclick="initGame('Gun')">20mm機銃 (対空)</button>
    <button onclick="initGame('Bomb')">250kg爆弾 (対地)</button>
</div>

<div id="ui">
    <div id="hp-display">HP: 100</div>
    <div id="weapon-display">Weapon: ---</div>
    <p style="font-size: 12px;">画面左半分：旋回 / 右半分：上昇・下降</p>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, player, weapon;
let isDead = false;
const particles = [];

function initGame(selectedWeapon) {
    document.getElementById('start-menu').style.display = 'none';
    document.getElementById('weapon-display').innerText = "Weapon: " + selectedWeapon;

    // 1. シーン・カメラ設定
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // 青空
    
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. 光源
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7).normalize();
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // 3. 零戦（簡易モデル：緑の十字）
    player = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 2), new THREE.MeshLambertMaterial({color: 0x2d5d2d}));
    const wing = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 0.8), new THREE.MeshLambertMaterial({color: 0x2d5d2d}));
    player.add(body, wing);
    scene.add(player);

    // 4. 地面（オープンワールド風）
    const grid = new THREE.GridHelper(1000, 100, 0x0000ff, 0x808080);
    grid.position.y = -10;
    scene.add(grid);

    // 操作設定
    window.addEventListener('touchstart', handleTouch);

    animate();
}

function handleTouch(e) {
    if (isDead) return;
    const touchX = e.touches[0].clientX;
    const touchY = e.touches[0].clientY;

    if (touchX < window.innerWidth / 2) {
        player.rotation.y += 0.2; // 左旋回
    } else {
        player.rotation.x -= 0.1; // 上昇
    }
}

function explode() {
    isDead = true;
    for (let i = 0; i < 50; i++) {
        const p = new THREE.Mesh(
            new THREE.BoxGeometry(0.2, 0.2, 0.2),
            new THREE.MeshBasicMaterial({color: Math.random() > 0.5 ? 0xff4500 : 0x000000})
        );
        p.position.copy(player.position);
        p.userData = { 
            velocity: new THREE.Vector3((Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5) 
        };
        scene.add(p);
        particles.push(p);
    }
    scene.remove(player);
    setTimeout(() => { alert("Game Over"); location.reload(); }, 2000);
}

function animate() {
    requestAnimationFrame(animate);

    if (!isDead) {
        // 前進
        player.translateZ(0.2);
        
        // カメラが後ろから追従
        const offset = new THREE.Vector3(0, 2, -10).applyQuaternion(player.quaternion);
        camera.position.copy(player.position).add(offset);
        camera.lookAt(player.position);

        // 地面に激突判定
        if (player.position.y < -9.5) explode();
    }

    // 爆発パーティクルの更新
    particles.forEach(p => {
        p.position.add(p.userData.velocity);
        p.rotation.x += 0.1;
    });

    renderer.render(scene, camera);
}

// グローバルに関数を公開
window.initGame = initGame;
</script>
</body>
</html>
