<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zero Fighter Pro 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; }
        .btn { 
            width: 80px; height: 80px; background: rgba(255,0,0,0.6); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: white; 
            font-weight: bold; pointer-events: auto; user-select: none;
        }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px; background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; }
        #weapon-select { position: absolute; top: 20px; width: 100%; text-align: center; }
        .w-btn { padding: 10px; background: white; margin: 5px; pointer-events: auto; }
    </style>
</head>
<body>

<div id="weapon-select">
    <button class="w-btn" onclick="setWeapon('gun')">20mm機銃</button>
    <button class="w-btn" onclick="setWeapon('bomb')">250kg爆弾</button>
</div>

<div id="ui">
    <div id="joystick-zone"></div>
    <div class="btn" id="fire-btn">FIRE</div>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, player;
let joystick = { x: 0, y: 0, active: false };
let bullets = [], bombs = [], enemies = [];
let weaponMode = 'gun';
let isDead = false;

// 初期化
function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 光源
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(100, 200, 100);
    scene.add(sun, new THREE.AmbientLight(0x606060));

    // プレイヤー(零戦)
    player = new THREE.Group();
    const mat = new THREE.MeshLambertMaterial({color: 0x2d5d2d});
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 3), mat);
    const wing = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 1), mat);
    player.add(body, wing);
    player.position.y = 50;
    scene.add(player);

    // 地面と敵ターゲット
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshLambertMaterial({color: 0x3e5d3e}));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    for(let i=0; i<20; i++) {
        const enemy = new THREE.Mesh(new THREE.BoxGeometry(10, 20, 10), new THREE.MeshLambertMaterial({color: 0xff0000}));
        enemy.position.set(Math.random()*800-400, 10, Math.random()*800-400);
        scene.add(enemy);
        enemies.push(enemy);
    }

    // 操作イベント
    setupControls();
    animate();
}

function setupControls() {
    const zone = document.getElementById('joystick-zone');
    zone.addEventListener('touchstart', (e) => { joystick.active = true; });
    zone.addEventListener('touchmove', (e) => {
        const rect = zone.getBoundingClientRect();
        const touch = e.touches[0];
        joystick.x = ((touch.clientX - rect.left) / rect.width - 0.5) * 2;
        joystick.y = ((touch.clientY - rect.top) / rect.height - 0.5) * 2;
    });
    zone.addEventListener('touchend', () => { joystick.x = 0; joystick.y = 0; joystick.active = false; });

    document.getElementById('fire-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        fireWeapon();
    });
}

window.setWeapon = (mode) => { weaponMode = mode; };

function fireWeapon() {
    if (isDead) return;
    if (weaponMode === 'gun') {
        const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
        b.position.copy(player.position);
        b.quaternion.copy(player.quaternion);
        b.userData = { life: 100 };
        scene.add(b);
        bullets.push(b);
    } else {
        const bomb = new THREE.Mesh(new THREE.SphereGeometry(0.8), new THREE.MeshBasicMaterial({color: 0x333333}));
        bomb.position.copy(player.position);
        bomb.userData = { velocity: new THREE.Vector3(0, -0.2, 0).applyQuaternion(player.quaternion).add(new THREE.Vector3(0,0,0)), gravity: -0.01 };
        // 爆弾は前進慣性を少し持たせる
        const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(player.quaternion).multiplyScalar(1);
        bomb.userData.velocity = forward;
        scene.add(bomb);
        bombs.push(bomb);
    }
}

function explode(pos, isPlayer = false) {
    const parts = [];
    for(let i=0; i<15; i++) {
        const p = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshBasicMaterial({color: 0xff4500}));
        p.position.copy(pos);
        p.userData = { v: new THREE.Vector3((Math.random()-0.5)*1, (Math.random()-0.5)*1, (Math.random()-0.5)*1) };
        scene.add(p);
        parts.push(p);
    }
    if(isPlayer) {
        isDead = true;
        scene.remove(player);
        setTimeout(() => location.reload(), 2000);
    }
    // パーティクル消去処理は簡易化のため省略
}

function animate() {
    requestAnimationFrame(animate);

    if (!isDead) {
        // 旋回ロジック
        player.rotation.y -= joystick.x * 0.05;
        player.rotation.x -= joystick.y * 0.03;
        player.translateZ(1.2); // 前進

        // カメラ追従
        const camOffset = new THREE.Vector3(0, 5, -15).applyQuaternion(player.quaternion);
        camera.position.copy(player.position).add(camOffset);
        camera.lookAt(player.position);

        if (player.position.y < 0) explode(player.position, true);
    }

    // 機銃弾の移動と判定
    bullets.forEach((b, i) => {
        b.translateZ(4);
        b.userData.life--;
        enemies.forEach(en => {
            if(b.position.distanceTo(en.position) < 10) {
                explode(en.position);
                en.position.y = -100; // 破壊（画面外へ）
            }
        });
        if(b.userData.life < 0) { scene.remove(b); bullets.splice(i, 1); }
    });

    // 爆弾の移動
    bombs.forEach((b, i) => {
        b.userData.velocity.y -= 0.02; // 重力
        b.position.add(b.userData.velocity);
        if(b.position.y < 0) {
            explode(b.position);
            enemies.forEach(en => {
                if(b.position.distanceTo(en.position) < 30) en.position.y = -100;
            });
            scene.remove(b);
            bombs.splice(i, 1);
        }
    });

    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
