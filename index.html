<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zero Fighter Ace 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; bottom: 0; width: 100%; height: 100%; pointer-events: none; }
        /* 左手ジョイスティック */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px; background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; }
        #joystick-handle { position: absolute; top: 50px; left: 50px; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; display: none; }
        /* 右手視点操作エリア */
        #look-zone { position: absolute; top: 0; right: 0; width: 50%; height: 100%; pointer-events: auto; }
        /* 武装選択と発射ボタン */
        #weapon-select { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none;}
        .w-btn { padding: 10px; background: white; margin: 5px; pointer-events: auto; }
        #fire-btn-container { position: absolute; bottom: 20px; right: 20px; pointer-events: none; }
        #fire-btn { 
            width: 80px; height: 80px; background: rgba(255,0,0,0.6); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: white; 
            font-weight: bold; pointer-events: auto; user-select: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="joystick-zone">
        <div id="joystick-handle"></div>
    </div>
    <div id="look-zone"></div>
    <div id="weapon-select">
        <button class="w-btn" onclick="setWeapon('gun')">20mm機銃</button>
        <button class="w-btn" onclick="setWeapon('bomb')">250kg爆弾</button>
    </div>
    <div id="fire-btn-container">
        <div class="btn" id="fire-btn">FIRE</div>
    </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, player;
// 操作関連
let joystick = { x: 0, y: 0, active: false };
const lookState = { yaw: 0, pitch: 0, radius: 15, prevX: 0, prevY: 0, active: false };
// ゲームオブジェクト
let bullets = [], bombs = [], enemies = [], explosionParticles = [];
let weaponMode = 'gun';
let isDead = false;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 光源
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(100, 200, 100);
    scene.add(sun, new THREE.AmbientLight(0x606060));

    // 自機（零戦：簡易モデル）
    player = new THREE.Group();
    const mat = new THREE.MeshLambertMaterial({color: 0x2d5d2d});
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 3), mat);
    const wing = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 1), mat);
    player.add(body, wing);
    player.position.y = 50;
    scene.add(player);

    // 地面と敵ターゲット
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshLambertMaterial({color: 0x3e5d3e}));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    for(let i=0; i<15; i++) {
        const enemy = new THREE.Mesh(new THREE.BoxGeometry(10, 20, 10), new THREE.MeshLambertMaterial({color: 0xff0000}));
        enemy.position.set(Math.random()*800-400, 10, Math.random()*800-400);
        scene.add(enemy);
        enemies.push(enemy);
    }

    // 操作設定
    setupControls();
    animate();
}

function setupControls() {
    // 左手ジョイスティック
    const zone = document.getElementById('joystick-zone');
    const handle = document.getElementById('joystick-handle');
    zone.addEventListener('touchstart', (e) => { 
        joystick.active = true; 
        handle.style.display = 'block';
    });
    zone.addEventListener('touchmove', (e) => {
        if (!joystick.active) return;
        const rect = zone.getBoundingClientRect();
        const touch = e.touches[0];
        const halfWidth = rect.width / 2;
        const dx = (touch.clientX - (rect.left + halfWidth));
        const dy = (touch.clientY - (rect.top + halfWidth));
        
        // ジョイスティックの値を正規化
        joystick.x = Math.max(-1, Math.min(1, dx / halfWidth));
        joystick.y = Math.max(-1, Math.min(1, dy / halfWidth));
        
        // ハンドルの位置を更新
        handle.style.left = (rect.width/2 + joystick.x * rect.width/2 - 25) + 'px';
        handle.style.top = (rect.height/2 + joystick.y * rect.width/2 - 25) + 'px';
    });
    zone.addEventListener('touchend', () => { 
        joystick.x = 0; joystick.y = 0; joystick.active = false; 
        handle.style.display = 'none';
    });

    // 右手視点操作
    const lookZone = document.getElementById('look-zone');
    lookZone.addEventListener('touchstart', (e) => { 
        lookState.active = true;
        const touch = e.touches[0];
        lookState.prevX = touch.clientX;
        lookState.prevY = touch.clientY;
    });
    lookZone.addEventListener('touchmove', (e) => {
        if (!lookState.active) return;
        const touch = e.touches[0];
        const deltaX = touch.clientX - lookState.prevX;
        const deltaY = touch.clientY - lookState.prevY;
        
        // 視点を更新
        lookState.yaw -= deltaX * 0.005; // 横の回転
        lookState.pitch -= deltaY * 0.005; // 縦の回転
        // 縦の回転を制限（真上・真下を向かないように）
        lookState.pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, lookState.pitch));
        
        lookState.prevX = touch.clientX;
        lookState.prevY = touch.clientY;
    });
    lookZone.addEventListener('touchend', () => { lookState.active = false; });

    // 武装発射ボタン
    document.getElementById('fire-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        fireWeapon();
    });
}

// 武装設定関数（グローバルに公開）
window.setWeapon = (mode) => { weaponMode = mode; };

function fireWeapon() {
    if (isDead) return;
    if (weaponMode === 'gun') {
        const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
        b.position.copy(player.position);
        b.quaternion.copy(player.quaternion);
        b.userData = { life: 100 };
        scene.add(b);
        bullets.push(b);
    } else {
        const bomb = new THREE.Mesh(new THREE.SphereGeometry(0.8), new THREE.MeshBasicMaterial({color: 0x333333}));
        bomb.position.copy(player.position);
        const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(player.quaternion).multiplyScalar(1);
        bomb.userData = { velocity: forward };
        scene.add(bomb);
        bombs.push(bomb);
    }
}

// 爆発演出関数
function explode(pos, isPlayer = false) {
    const numParticles = 40;
    for(let i=0; i<numParticles; i++) {
        // 様々な破片を作成（色や形を変える）
        const isFire = Math.random() > 0.4;
        const mat = new THREE.MeshBasicMaterial({
            color: isFire ? 0xff4500 : 0x000000, 
            transparent: true, 
            opacity: 1
        });
        const p = new THREE.Mesh(
            isFire ? new THREE.SphereGeometry(0.5) : new THREE.BoxGeometry(1, 1, 1), 
            mat
        );
        p.position.copy(pos);
        // ランダムな高速ベクトルを付与
        const speedMultiplier = isFire ? 2 : 1.5;
        p.userData = { 
            v: new THREE.Vector3((Math.random()-0.5)*speedMultiplier, (Math.random()-0.5)*speedMultiplier, (Math.random()-0.5)*speedMultiplier),
            life: Math.random() * 50 + 50, // パーティクルの寿命
            isFire: isFire
        };
        scene.add(p);
        explosionParticles.push(p);
    }
    
    // 自機の場合、ゲームオーバーへ
    if(isPlayer) {
        isDead = true;
        scene.remove(player);
        setTimeout(() => { alert("撃墜されました。再起動します。"); location.reload(); }, 3000);
    }
}

function updateCamera() {
    // 自機の背後（lookState.yaw/pitchに基づく位置）にカメラを配置
    const offsetX = lookState.radius * Math.sin(lookState.yaw) * Math.cos(lookState.pitch);
    const offsetY = lookState.radius * Math.sin(lookState.pitch);
    const offsetZ = lookState.radius * Math.cos(lookState.yaw) * Math.cos(lookState.pitch);
    
    const camPos = player.position.clone().add(new THREE.Vector3(offsetX, offsetY, -offsetZ));
    camera.position.copy(camPos);
    camera.lookAt(player.position);
}

function animate() {
    requestAnimationFrame(animate);

    if (!isDead) {
        // 自機の操作ロジック（左手ジョイスティック）
        player.rotation.y -= joystick.x * 0.05; // 左右：旋回
        player.rotation.x -= joystick.y * 0.03; // 上下：機首（逆操作）
        player.translateZ(1.2); // 前進（常時）

        // 視点更新
        updateCamera();

        // 地面に激突判定
        if (player.position.y < 0) explode(player.position, true);
    } else {
        // 撃墜後もカメラを動かし、爆発を映し続ける
        updateCamera();
    }

    // 機銃弾の移動と判定
    bullets.forEach((b, i) => {
        b.translateZ(4);
        b.userData.life--;
        enemies.forEach(en => {
            if(b.position.distanceTo(en.position) < 10) {
                explode(en.position); // 敵撃破も爆発させる
                en.position.y = -100; // 破壊（画面外へ）
            }
        });
        if(b.userData.life < 0) { scene.remove(b); bullets.splice(i, 1); }
    });

    // 爆弾の移動と判定
    bombs.forEach((b, i) => {
        b.userData.velocity.y -= 0.02; // 重力
        b.position.add(b.userData.velocity);
        if(b.position.y < 0) {
            explode(b.position);
            enemies.forEach(en => {
                if(b.position.distanceTo(en.position) < 30) en.position.y = -100;
            });
            scene.remove(b);
            bombs.splice(i, 1);
        }
    });

    // 爆発パーティクルの更新とフェードアウト
    explosionParticles.forEach((p, i) => {
        p.position.add(p.userData.v);
        p.userData.life--;
        p.material.opacity = Math.max(0, p.userData.life / 100); // 寿命とともに消える
        p.rotation.x += 0.1;
        if(p.userData.life <= 0) {
            scene.remove(p);
            explosionParticles.splice(i, 1);
        }
    });

    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
