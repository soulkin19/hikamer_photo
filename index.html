<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ヒカマニ画像データベース</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      padding: 8px;
    }
    .card {
      background: #1f2937;
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.25s ease;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .modal-content {
      background: #1f2937;
      border-radius: 16px;
      max-width: 90vw;
      max-height: 90vh;
      overflow: auto;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <div class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
    <h1 class="text-4xl sm:text-5xl font-bold text-center mb-10 text-orange-400">
      ヒカマニ画像データベース
    </h1>

    <!-- 検索 -->
    <div class="mb-10">
      <input 
        id="searchInput"
        type="text"
        placeholder="キーワード検索（例：驚く セイキン アナル ウホッ）"
        class="w-full p-4 text-lg bg-gray-800 border border-gray-700 rounded-xl focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/30"
      />
    </div>

    <!-- お気に入りエリア -->
    <section class="mb-16">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-3xl font-bold flex items-center gap-3">
          <span>❤️ お気に入り</span>
          <span id="favCount" class="text-xl text-gray-400">(0)</span>
        </h2>
        <button 
          onclick="clearFavorites()"
          class="px-4 py-2 bg-red-700 hover:bg-red-600 rounded-lg text-sm font-medium transition"
        >
          すべてクリア
        </button>
      </div>
      <div id="favoritesGallery" class="gallery"></div>
    </section>

    <!-- メインギャラリー -->
    <div id="mainGallery" class="gallery"></div>
  </div>

  <!-- 画像モーダル -->
  <div id="modal" class="modal">
    <div class="modal-content p-6 sm:p-8 relative">
      <button 
        onclick="closeModal()"
        class="absolute top-4 right-4 text-4xl text-gray-400 hover:text-white transition"
      >×</button>

      <img id="modalImg" class="w-full max-h-[60vh] object-contain rounded-xl mb-6 mx-auto" alt="拡大画像">

      <h3 id="modalTitle" class="text-2xl font-bold mb-3"></h3>
      <p id="modalDesc" class="text-gray-300 mb-4"></p>
      
      <div id="modalTags" class="flex flex-wrap gap-2 mb-6"></div>

      <div class="flex flex-col sm:flex-row gap-4">
        <button 
          onclick="downloadCurrent()"
          class="flex-1 bg-orange-600 hover:bg-orange-500 py-4 rounded-xl font-bold text-lg transition"
        >
          ⬇️ ダウンロード
        </button>
        <button 
          id="favBtn"
          onclick="toggleFavoriteCurrent()"
          class="flex-1 bg-pink-600 hover:bg-pink-500 py-4 rounded-xl font-bold text-lg transition"
        >
          ❤️ お気に入りに追加
        </button>
      </div>
    </div>
  </div>

  <script>
    // ── データ（ここに画像を追加してください） ────────────────────────────────
    const database = [
      {
        id: 1,
        title: "ヒカキン 超驚き顔",
        tags: ["驚く", "ヒカキン", "定番"],
        desc: "ほぼ毎動画に出てくるあの顔",
        url: "images/hikakin_odoroki_001.jpg"
      },
      {
        id: 2,
        title: "セイキン アナル言いそう",
        tags: ["セイキン", "アナル", "語録"],
        desc: "言っちゃいそうな瞬間",
        url: "images/seikin_anaru_moment.jpg"
      },
      {
        id: 3,
        title: "ウホッッ！！",
        tags: ["ウホッ", "効果音", "名シーン"],
        desc: "伝説のウホッ",
        url: "images/uho.jpg"
      },
      // ここに好きなだけ追加してください
      // 例：
      // {
      //   id: 999,
      //   title: "新しいネタ",
      //   tags: ["新作", "2026"],
      //   desc: "最新のやつ",
      //   url: "images/2026_new.jpg"
      // },
    ];

    let currentItem = null;
    let favorites = JSON.parse(localStorage.getItem("hikamani_favs") || "[]");

    // ── ギャラリー描画 ───────────────────────────────────────────────────────
    function renderGallery(items, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";

      if (items.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-500 col-span-full py-12">まだアイテムがありません</p>`;
        return;
      }

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <img src="${item.url}" alt="${item.title}" loading="lazy">
          <div class="p-4">
            <h4 class="font-bold mb-2">${item.title}</h4>
            <div class="flex flex-wrap gap-1">
              ${item.tags.map(t => `<span class="text-xs bg-gray-700 px-2 py-0.5 rounded">${t}</span>`).join("")}
            </div>
          </div>
        `;
        div.onclick = () => openModal(item);
        container.appendChild(div);
      });
    }

    // ── 検索 ─────────────────────────────────────────────────────────────────
    document.getElementById("searchInput").addEventListener("input", e => {
      const q = e.target.value.toLowerCase().trim();
      if (!q) {
        renderGallery(database, "mainGallery");
        return;
      }

      const filtered = database.filter(item =>
        item.title.toLowerCase().includes(q) ||
        item.desc.toLowerCase().includes(q) ||
        item.tags.some(t => t.toLowerCase().includes(q))
      );

      renderGallery(filtered, "mainGallery");
    });

    // ── モーダル操作 ─────────────────────────────────────────────────────────
    function openModal(item) {
      currentItem = item;
      document.getElementById("modal").style.display = "flex";
      document.getElementById("modalImg").src = item.url;
      document.getElementById("modalImg").alt = item.title;
      document.getElementById("modalTitle").textContent = item.title;
      document.getElementById("modalDesc").textContent = item.desc;

      const tagsDiv = document.getElementById("modalTags");
      tagsDiv.innerHTML = item.tags
        .map(t => `<span class="bg-gray-700 px-3 py-1 rounded text-sm">${t}</span>`)
        .join("");

      updateFavoriteButton();
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
      currentItem = null;
    }

    // ── お気に入り ───────────────────────────────────────────────────────────
    function isFavorite(id) {
      return favorites.some(f => f.id === id);
    }

    function toggleFavorite(item) {
      const idx = favorites.findIndex(f => f.id === item.id);
      if (idx === -1) {
        favorites.push(item);
      } else {
        favorites.splice(idx, 1);
      }
      localStorage.setItem("hikamani_favs", JSON.stringify(favorites));
      updateFavoriteButton();
      renderGallery(favorites, "favoritesGallery");
      document.getElementById("favCount").textContent = `(${favorites.length})`;
    }

    function toggleFavoriteCurrent() {
      if (currentItem) toggleFavorite(currentItem);
    }

    function updateFavoriteButton() {
      if (!currentItem) return;
      const btn = document.getElementById("favBtn");
      const isFav = isFavorite(currentItem.id);
      btn.textContent = isFav ? "❤️ お気に入りから削除" : "❤️ お気に入りに追加";
      btn.classList.toggle("bg-pink-600", !isFav);
      btn.classList.toggle("hover:bg-pink-500", !isFav);
      btn.classList.toggle("bg-red-600", isFav);
      btn.classList.toggle("hover:bg-red-500", isFav);
    }

    function clearFavorites() {
      if (!confirm("お気に入りをすべて削除しますか？")) return;
      favorites = [];
      localStorage.removeItem("hikamani_favs");
      renderGallery([], "favoritesGallery");
      document.getElementById("favCount").textContent = "(0)";
      if (currentItem) updateFavoriteButton();
    }

    // ── ダウンロード ─────────────────────────────────────────────────────────
    function downloadCurrent() {
      if (!currentItem) return;
      const a = document.createElement("a");
      a.href = currentItem.url;
      a.download = `${currentItem.title.replace(/[\s/\\?%*:|"<>]/g, "_")}.jpg`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // ── 初期表示 ─────────────────────────────────────────────────────────────
    renderGallery(database, "mainGallery");
    renderGallery(favorites, "favoritesGallery");
    document.getElementById("favCount").textContent = `(${favorites.length})`;
  </script>
</body>
</html>
