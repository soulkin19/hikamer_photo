<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>スロットカー対決！（世界のアソビ大全51風・BOT弱め調整）</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0d1b2a;
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #ffd60a;
      margin-bottom: 10px;
    }
    #track {
      width: 90%;
      max-width: 800px;
      height: 180px;
      margin: 30px auto;
      background: linear-gradient(to right, #222, #444);
      border: 6px solid #333;
      border-radius: 15px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }
    .slot-line {
      position: absolute;
      height: 4px;
      background: repeating-linear-gradient(
        to right,
        transparent 0px,
        #ffd60a 0px,
        #ffd60a 12px,
        transparent 12px,
        transparent 24px
      );
      width: 100%;
      top: 45%;
    }
    .car {
      width: 80px;
      height: 45px;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 42px;
      transition: left 0.05s linear;
      text-shadow: 0 0 10px currentColor;
    }
    #player-car   { left: 0; color: #ff4d6d; }
    #bot-car      { left: 0; color: #00d4ff; top: 25%; }

    #finish {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 65px;
      color: #ffd60a;
      text-shadow: 0 0 20px #ffd60a;
    }

    #info {
      font-size: 1.4rem;
      margin: 15px 0;
      min-height: 2em;
      font-weight: bold;
    }

    button {
      font-size: 1.5rem;
      padding: 16px 40px;
      margin: 8px;
      border: none;
      border-radius: 12px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #ff758c; transform: scale(1.08); }
    button:disabled { background: #555; cursor: not-allowed; transform: none; }

    #startBtn { background: #00d4ff; font-size: 1.6rem; }
    #accelBtn {
      background: #ffaa00;
      font-size: 1.8rem;
      padding: 20px 50px;
      box-shadow: 0 0 15px #ffaa00;
    }
    #accelBtn:active {
      background: #ffdd00;
      transform: scale(0.95);
    }

    .hidden { display: none; }
    .speed {
      font-size: 1.1rem;
      color: #ffd60a;
    }
  </style>
</head>
<body>

<h1>スロットカー対決！（世界のアソビ大全51風・BOTかなり弱め）</h1>
<p style="color:#aaa;">アクセル押しっぱなしで加速・離すと減速！<br>長押ししすぎるとコースアウトのリスクあり。<br>BOTを大幅に遅く＆ミス多めにしたよ！</p>

<div id="track">
  <div class="slot-line"></div>
  <div id="finish">🏁</div>
  <div id="player-car" class="car">🚗</div>
  <div id="bot-car" class="car">🤖</div>
</div>

<div id="info">準備OK！　スタート押して、アクセルをリズムよく操作しよう！</div>
<div class="speed" id="speedDisplay">あなたの速度: 0　｜　BOT速度: 0</div>

<button id="startBtn">スタート！</button>
<button id="accelBtn">アクセル<br>（押して加速）</button>
<button id="resetBtn" class="hidden">もう一回レース</button>

<script>
const playerCar = document.getElementById('player-car');
const botCar    = document.getElementById('bot-car');
const info      = document.getElementById('info');
const speedDisp = document.getElementById('speedDisplay');
const startBtn  = document.getElementById('startBtn');
const accelBtn  = document.getElementById('accelBtn');
const resetBtn  = document.getElementById('resetBtn');

const TRACK_WIDTH = document.getElementById('track').clientWidth - 100;
const FINISH_LINE = TRACK_WIDTH;

let playerPos = 0;
let botPos    = 0;
let playerSpeed = 0;
let botSpeed    = 0;
let isAccelerating = false;
let holdDuration = 0;
let gameRunning = false;
let lastTime = 0;

function resetGame() {
  playerPos = 0;
  botPos = 0;
  playerSpeed = 0;
  botSpeed = 0;
  isAccelerating = false;
  holdDuration = 0;
  playerCar.style.left = '0px';
  botCar.style.left = '0px';
  playerCar.textContent = '🚗';
  botCar.textContent = '🤖';
  info.textContent = "準備OK！　スタート押して、アクセルをリズムよく操作しよう！";
  speedDisp.textContent = "あなたの速度: 0　｜　BOT速度: 0";
  startBtn.disabled = false;
  accelBtn.disabled = true;
  resetBtn.classList.add('hidden');
  gameRunning = false;
}

function updatePositions(timestamp) {
  if (!gameRunning) return;
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;

  // プレイヤー
  if (isAccelerating) {
    playerSpeed += 20 * dt;           // 加速を少し上げて遊びやすく
    holdDuration += dt;
    if (holdDuration > 1.2 && Math.random() < 0.18) {  // コースアウト確率を少し下げた
      playerSpeed *= 0.3;
      info.textContent = "⚠️ コースアウト！　スピード大ダウン！";
      holdDuration = 0;
    }
  } else {
    holdDuration = 0;
  }
  playerSpeed *= 0.93;                 // 減速を少し緩やかに
  playerSpeed = Math.max(0, Math.min(playerSpeed, 38));

  playerPos += playerSpeed * dt * 1400;  // プレイヤー進みやすく調整
  playerPos = Math.min(playerPos, FINISH_LINE + 50);

  // BOT（かなり弱体化：加速遅く、ミス多め、上限低め）
  if (Math.random() < 0.75) {          // 加速する確率を下げた（ミス多め）
    botSpeed += (Math.random() * 0.5 + 0.4);  // 加速量を大幅減
  } else {
    botSpeed *= 0.25;                 // ミス時の減速を強く
    info.textContent = "BOTがコースアウト！　チャンス！";
  }
  botSpeed = Math.min(botSpeed, 12);   // 上限をかなり低く（本家「やばい」より遅く）
  botPos += botSpeed * dt * 1100;      // BOTの進みも遅く
  botPos = Math.min(botPos, FINISH_LINE + 50);

  // 表示
  playerCar.style.left = playerPos + 'px';
  botCar.style.left = botPos + 'px';
  speedDisp.textContent = `あなたの速度: ${Math.floor(playerSpeed)}　｜　BOT速度: ${Math.floor(botSpeed)}`;

  // 勝敗
  if (playerPos >= FINISH_LINE || botPos >= FINISH_LINE) {
    gameRunning = false;
    accelBtn.disabled = true;
    isAccelerating = false;

    if (playerPos >= FINISH_LINE && botPos < FINISH_LINE - 30) {
      info.innerHTML = "🎉 <strong>あなたの勝ち！</strong>　余裕だったね！";
      playerCar.textContent = "🚗✨";
    } else if (botPos >= FINISH_LINE && playerPos < FINISH_LINE - 30) {
      info.innerHTML = "😢 BOTの勝ち…　次はポンピング連打で勝とう！";
      botCar.textContent = "🤖🏆";
    } else {
      info.textContent = "ドロー！　いい勝負だった！";
    }
    resetBtn.classList.remove('hidden');
    return;
  }

  requestAnimationFrame(updatePositions);
}

// アクセル操作（タッチ・クリック両対応）
accelBtn.addEventListener('mousedown', () => { if (gameRunning) isAccelerating = true; });
accelBtn.addEventListener('mouseup', () => { isAccelerating = false; });
accelBtn.addEventListener('mouseleave', () => { isAccelerating = false; });
accelBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if (gameRunning) isAccelerating = true; });
accelBtn.addEventListener('touchend', (e) => { e.preventDefault(); isAccelerating = false; });

startBtn.onclick = () => {
  resetGame();
  gameRunning = true;
  playerSpeed = 0;
  botSpeed = 2 + Math.random() * 2;  // スタート時のBOT速度も低く
  holdDuration = 0;

  info.textContent = "レース開始！　アクセルをポン、ポン…と短く連打すると速く走れるよ！";
  startBtn.disabled = true;
  accelBtn.disabled = false;

  lastTime = 0;
  requestAnimationFrame(updatePositions);
};

resetBtn.onclick = resetGame;

resetGame();
</script>

</body>
</html>
