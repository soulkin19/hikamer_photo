<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zero Ace: WTM Style</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; }
        
        /* 操作系 */
        #joystick-zone { position: absolute; bottom: 50px; left: 50px; width: 140px; height: 140px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; pointer-events: auto; }
        #joystick-handle { position: absolute; top: 45px; left: 45px; width: 50px; height: 50px; background: white; border-radius: 50%; opacity: 0.5; display: none; }
        
        #look-zone { position: absolute; top: 0; right: 0; width: 60%; height: 100%; pointer-events: auto; }
        
        #fire-btn { 
            position: absolute; bottom: 40px; right: 40px; width: 90px; height: 90px; 
            background: radial-gradient(#ff4b2b, #ff416c); border-radius: 50%; 
            border: 4px solid white; color: white; font-weight: bold; 
            display: flex; align-items: center; justify-content: center; 
            pointer-events: auto; box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }
        
        #weapon-select { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: auto; }
        .w-btn { padding: 12px 20px; background: rgba(0,0,0,0.6); color: white; border: 1px solid white; margin: 0 5px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="weapon-select">
        <button class="w-btn" onclick="setWeapon('gun')">20mm機銃</button>
        <button class="w-btn" onclick="setWeapon('bomb')">250kg爆弾</button>
    </div>
    <div id="joystick-zone"><div id="joystick-handle"></div></div>
    <div id="look-zone"></div>
    <div id="fire-btn">FIRE</div>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, player, planeGroup;
let joystick = { x: 0, y: 0, active: false };
let look = { yaw: 0, pitch: 0, active: false, targetYaw: 0, targetPitch: 0 };
let bullets = [], bombs = [], enemies = [], particles = [];
let weaponMode = 'gun';
let isDead = false;

// WTM風の設定値
const PLANE_SPEED = 1.8;
const TURN_SPEED = 0.04;
const ROLL_MAX = 0.8; // 最大傾き
const CAM_LERP = 0.08; // カメラの追従遅延（小さいほど遅れる）

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 200, 1000);

    camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 2000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(100, 200, 100);
    sun.castShadow = true;
    scene.add(sun, new THREE.AmbientLight(0x707070));

    // 機体グループ（回転制御用）
    planeGroup = new THREE.Group();
    player = new THREE.Group(); // モデル本体
    
    const mat = new THREE.MeshLambertMaterial({color: 0x2d5d2d});
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 4), mat);
    body.rotation.x = Math.PI / 2;
    const wing = new THREE.Mesh(new THREE.BoxGeometry(5, 0.1, 1.2), mat);
    const tail = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.1, 0.6), mat);
    tail.position.set(0, 0, -1.8);
    
    player.add(body, wing, tail);
    planeGroup.add(player);
    planeGroup.position.y = 100;
    scene.add(planeGroup);

    // 大地
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(5000, 5000), new THREE.MeshLambertMaterial({color: 0x4a6b4a}));
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
    
    // 敵ターゲット
    for(let i=0; i<30; i++) {
        const en = new THREE.Mesh(new THREE.BoxGeometry(15, 30, 15), new THREE.MeshLambertMaterial({color: 0x8b0000}));
        en.position.set(Math.random()*1500-750, 15, Math.random()*1500-750);
        scene.add(en);
        enemies.push(en);
    }

    setupControls();
    animate();
}

function setupControls() {
    const jZone = document.getElementById('joystick-zone');
    const jHandle = document.getElementById('joystick-handle');
    jZone.addEventListener('touchstart', (e) => { joystick.active = true; jHandle.style.display = 'block'; });
    jZone.addEventListener('touchmove', (e) => {
        const rect = jZone.getBoundingClientRect();
        const t = e.touches[0];
        joystick.x = Math.max(-1, Math.min(1, (t.clientX - (rect.left + 70)) / 70));
        joystick.y = Math.max(-1, Math.min(1, (t.clientY - (rect.top + 70)) / 70));
        jHandle.style.left = (45 + joystick.x * 40) + 'px';
        jHandle.style.top = (45 + joystick.y * 40) + 'px';
    });
    jZone.addEventListener('touchend', () => { joystick.active = false; joystick.x = 0; joystick.y = 0; jHandle.style.display = 'none'; });

    const lZone = document.getElementById('look-zone');
    let lastX, lastY;
    lZone.addEventListener('touchstart', (e) => { look.active = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; });
    lZone.addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        look.targetYaw -= (t.clientX - lastX) * 0.007;
        look.targetPitch -= (t.clientY - lastY) * 0.007;
        look.targetPitch = Math.max(-0.8, Math.min(0.8, look.targetPitch));
        lastX = t.clientX; lastY = t.clientY;
    });
    lZone.addEventListener('touchend', () => { look.active = false; });

    document.getElementById('fire-btn').addEventListener('touchstart', (e) => { e.preventDefault(); fire(); });
}

window.setWeapon = (m) => weaponMode = m;

function fire() {
    if(isDead) return;
    const b = new THREE.Mesh(new THREE.SphereGeometry(weaponMode === 'gun' ? 0.3 : 0.8), new THREE.MeshBasicMaterial({color: 0xfff000}));
    b.position.copy(planeGroup.position);
    b.quaternion.copy(planeGroup.quaternion);
    b.userData = { mode: weaponMode, velocity: new THREE.Vector3(0,0,1).applyQuaternion(planeGroup.quaternion).multiplyScalar(weaponMode==='gun'?5:1), life: 120 };
    scene.add(b);
    bullets.push(b);
}

function explode(pos, isPlayer=false) {
    for(let i=0; i<30; i++) {
        const p = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshBasicMaterial({color: Math.random()>0.3?0xff4400:0x222222}));
        p.position.copy(pos);
        p.userData = { v: new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2), life: 60 };
        scene.add(p);
        particles.push(p);
    }
    if(isPlayer) {
        isDead = true;
        scene.remove(planeGroup);
        setTimeout(() => location.reload(), 3000);
    }
}

function animate() {
    requestAnimationFrame(animate);

    if(!isDead) {
        // 機体の動き: WTM風
        planeGroup.rotation.y -= joystick.x * TURN_SPEED;
        planeGroup.rotation.x -= joystick.y * TURN_SPEED * 0.5;
        
        // ローリング演出: 旋回に合わせて機体を傾ける
        player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, -joystick.x * ROLL_MAX, 0.1);
        player.rotation.x = THREE.MathUtils.lerp(player.rotation.x, joystick.y * 0.2, 0.1);

        planeGroup.translateZ(PLANE_SPEED);

        // 自由視点の滑らかな復帰
        if(!look.active) {
            look.targetYaw = THREE.MathUtils.lerp(look.targetYaw, 0, 0.05);
            look.targetPitch = THREE.MathUtils.lerp(look.targetPitch, 0, 0.05);
        }
        look.yaw = THREE.MathUtils.lerp(look.yaw, look.targetYaw, 0.1);
        look.pitch = THREE.MathUtils.lerp(look.pitch, look.targetPitch, 0.1);

        // カメラ追従: Lerpによる「遊び」
        const idealOffset = new THREE.Vector3(
            Math.sin(look.yaw) * 15,
            Math.sin(look.pitch) * 15 + 4,
            -Math.cos(look.yaw) * 15
        ).applyQuaternion(planeGroup.quaternion);
        
        const targetCamPos = planeGroup.position.clone().add(idealOffset);
        camera.position.lerp(targetCamPos, CAM_LERP);
        camera.lookAt(planeGroup.position.clone().add(new THREE.Vector3(0,1,0)));

        if(planeGroup.position.y < 0) explode(planeGroup.position, true);
    }

    // 弾丸・爆弾
    bullets.forEach((b, i) => {
        if(b.userData.mode === 'bomb') b.userData.velocity.y -= 0.02;
        b.position.add(b.userData.velocity);
        b.userData.life--;
        enemies.forEach(en => {
            if(b.position.distanceTo(en.position) < 15) { explode(en.position); en.position.y = -500; }
        });
        if(b.userData.life < 0 || b.position.y < 0) {
            if(b.position.y < 0) explode(b.position);
            scene.remove(b); bullets.splice(i, 1);
        }
    });

    // 爆発パーティクル
    particles.forEach((p, i) => {
        p.position.add(p.userData.v);
        p.userData.life--;
        p.material.opacity = p.userData.life / 60;
        if(p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
    });

    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
