<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zero Ace: WTM Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Courier New', monospace; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; color: #00ff00; }
        .hud-stats { position: absolute; top: 40px; left: 20px; font-size: 18px; font-weight: bold; }
        .reticle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 2px solid rgba(0,255,0,0.5); border-radius: 50%; }
        #joystick-zone { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; border: 2px solid rgba(0,255,0,0.3); border-radius: 50%; pointer-events: auto; }
        #fire-btn { 
            position: absolute; bottom: 40px; right: 40px; width: 100px; height: 100px; 
            background: rgba(255,0,0,0.2); border: 3px solid #ff0000; border-radius: 50%; 
            color: #ff0000; font-weight: bold; display: flex; align-items: center; justify-content: center; 
            pointer-events: auto; font-size: 20px;
        }
        #weapon-select { position: absolute; top: 20px; right: 20px; pointer-events: auto; }
        .w-btn { padding: 10px; background: rgba(0,255,0,0.2); color: #0f0; border: 1px solid #0f0; margin-bottom: 5px; display: block; width: 100px; }
        .active-w { background: rgba(0,255,0,0.5); color: #fff; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="hud-stats">SPD: <span id="spd-val">0</span><br>ALT: <span id="alt-val">0</span></div>
    <div class="reticle"></div>
    <div id="weapon-select">
        <button id="btn-gun" class="w-btn active-w" onclick="setWeapon('gun')">20mm</button>
        <button id="btn-bomb" class="w-btn" onclick="setWeapon('bomb')">BOMB</button>
    </div>
    <div id="joystick-zone"></div>
    <div id="fire-btn">FIRE</div>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, player, propeller, planeGroup;
let joystick = { x: 0, y: 0, active: false };
let look = { yaw: 0, pitch: 0, active: false };
let projectiles = [], enemies = [], particles = [];
let weaponMode = 'gun';
let isDead = false;
let mapType = Math.random() > 0.5 ? 'sea' : 'station';

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 5000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(500, 1000, 500);
    scene.add(sun, new THREE.AmbientLight(0x888888));

    setupMap();
    createPlayer();
    setupControls();
    animate();
}

function setupMap() {
    if (mapType === 'sea') {
        scene.background = new THREE.Color(0x4488ff);
        const water = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshLambertMaterial({color: 0x0044ff}));
        water.rotation.x = -Math.PI / 2;
        scene.add(water);
        for(let i=0; i<15; i++) createEnemy(Math.random()*2000-1000, 10, Math.random()*2000-1000, 40, 20, 80);
    } else {
        scene.background = new THREE.Color(0x050510);
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshLambertMaterial({color: 0x111111}));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);
        for(let i=0; i<40; i++) createEnemy(Math.random()*1500-750, 50, Math.random()*1500-750, 30, 100, 30);
    }
}

function createEnemy(x, y, z, w, h, d) {
    const en = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial({color: 0x777777}));
    en.position.set(x, h/2, z);
    // 当たり判定用のサイズを保持
    en.userData = { size: new THREE.Vector3(w, h, d) };
    scene.add(en);
    enemies.push(en);
}

function createPlayer() {
    planeGroup = new THREE.Group();
    player = new THREE.Group();
    const mat = new THREE.MeshLambertMaterial({color: 0x243b24});
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 4), mat);
    body.rotation.x = Math.PI / 2;
    const wing = new THREE.Mesh(new THREE.BoxGeometry(6, 0.1, 1.5), mat);
    propeller = new THREE.Mesh(new THREE.BoxGeometry(0.1, 3, 0.1), new THREE.MeshBasicMaterial({color: 0x000000}));
    propeller.position.z = 2.1;
    player.add(body, wing, propeller);
    planeGroup.add(player);
    planeGroup.position.y = 100;
    scene.add(planeGroup);
}

function setupControls() {
    const zone = document.getElementById('joystick-zone');
    zone.addEventListener('touchstart', () => joystick.active = true);
    zone.addEventListener('touchmove', (e) => {
        const r = zone.getBoundingClientRect();
        const t = e.touches[0];
        joystick.x = (t.clientX - (r.left + 60)) / 60;
        joystick.y = (t.clientY - (r.top + 60)) / 60;
    });
    zone.addEventListener('touchend', () => { joystick.active = false; joystick.x = 0; joystick.y = 0; });
    document.getElementById('fire-btn').addEventListener('touchstart', (e) => { e.preventDefault(); fire(); });
}

window.setWeapon = (m) => {
    weaponMode = m;
    document.getElementById('btn-gun').classList.toggle('active-w', m==='gun');
    document.getElementById('btn-bomb').classList.toggle('active-w', m==='bomb');
};

function fire() {
    if(isDead) return;
    const p = new THREE.Mesh(
        new THREE.SphereGeometry(weaponMode === 'gun' ? 0.3 : 0.8), 
        new THREE.MeshBasicMaterial({color: weaponMode==='gun'?0xffff00:0x333333})
    );
    p.position.copy(planeGroup.position);
    p.quaternion.copy(planeGroup.quaternion);
    const vel = new THREE.Vector3(0, 0, weaponMode === 'gun' ? 8 : 2).applyQuaternion(planeGroup.quaternion);
    p.userData = { type: weaponMode, vel: vel, life: 200 };
    scene.add(p);
    projectiles.push(p);
}

function explode(pos, scale=1, isPlayer=false) {
    for(let i=0; i<30 * scale; i++) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(1*scale, 1*scale, 1*scale), new THREE.MeshBasicMaterial({color: Math.random()>0.3?0xffaa00:0x333333}));
        m.position.copy(pos);
        m.userData = { v: new THREE.Vector3((Math.random()-0.5)*4*scale, (Math.random()-0.5)*4*scale, (Math.random()-0.5)*4*scale), life: 40 };
        scene.add(m);
        particles.push(m);
    }
    if(isPlayer) {
        isDead = true;
        scene.remove(planeGroup);
        setTimeout(() => location.reload(), 2000);
    }
}

function animate() {
    requestAnimationFrame(animate);
    if(!isDead) {
        // 操作：上にあげたら上、下にさげたら下 (joystick.yを反転させて適用)
        planeGroup.rotation.y -= joystick.x * 0.04;
        planeGroup.rotation.x += joystick.y * 0.03; // ここを + に変更
        player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, -joystick.x * 0.8, 0.1);
        planeGroup.translateZ(2.2);
        propeller.rotation.y += 0.8;

        const camOffset = new THREE.Vector3(0, 4, -15).applyQuaternion(planeGroup.quaternion);
        camera.position.lerp(planeGroup.position.clone().add(camOffset), 0.1);
        camera.lookAt(planeGroup.position);

        // HUD
        document.getElementById('spd-val').innerText = "320";
        document.getElementById('alt-val').innerText = Math.floor(planeGroup.position.y);

        // 障害物・敵との衝突判定
        enemies.forEach(en => {
            if(planeGroup.position.distanceTo(en.position) < 25) explode(planeGroup.position, 2, true);
        });
        if(planeGroup.position.y < 0) explode(planeGroup.position, 2, true);
    }

    // 弾丸と爆弾
    projectiles.forEach((p, i) => {
        if(p.userData.type === 'bomb') p.userData.vel.y -= 0.08;
        p.position.add(p.userData.vel);
        p.userData.life--;

        // 爆弾の破壊ロジック
        if(p.position.y <= 0 || p.userData.life <= 0) {
            explode(p.position, p.userData.type === 'bomb' ? 3 : 1);
            if(p.userData.type === 'bomb') {
                enemies.forEach(en => {
                    // 爆発半径(60)以内なら破壊
                    if(p.position.distanceTo(en.position) < 60) en.position.y = -2000;
                });
            }
            scene.remove(p); projectiles.splice(i, 1);
        } else {
            // 直撃判定
            enemies.forEach(en => {
                if(p.position.distanceTo(en.position) < 15) {
                    explode(en.position, 2);
                    en.position.y = -2000;
                    scene.remove(p); projectiles.splice(i, 1);
                }
            });
        }
    });

    particles.forEach((p, i) => {
        p.position.add(p.userData.v);
        p.userData.life--;
        p.material.opacity = p.userData.life / 40;
        if(p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
    });
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
