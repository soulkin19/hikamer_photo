<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>スロットカー対決！ あなた vs BOT</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0d1b2a;
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #ffd60a;
      margin-bottom: 10px;
    }
    #track {
      width: 90%;
      max-width: 800px;
      height: 160px;
      margin: 30px auto;
      background: linear-gradient(to right, #333, #555);
      border: 4px solid #444;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }
    .car {
      width: 70px;
      height: 40px;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 38px;
      transition: left 0.08s linear;
      text-shadow: 0 0 8px currentColor;
    }
    #player-car   { left: 0; color: #ff4d6d; }
    #bot-car      { left: 0; color: #00d4ff; top: 20%; }

    #finish {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 60px;
      color: #ffd60a;
      text-shadow: 0 0 15px #ffd60a;
      pointer-events: none;
    }

    #info {
      font-size: 1.3rem;
      margin: 20px 0;
      min-height: 1.8em;
    }

    button {
      font-size: 1.4rem;
      padding: 14px 32px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover { background: #ff758c; transform: scale(1.05); }
    button:disabled {
      background: #555;
      cursor: not-allowed;
      transform: none;
    }

    #startBtn { background: #00d4ff; }
    #startBtn:hover { background: #40e0ff; }

    .hidden { display: none; }
  </style>
</head>
<body>

<h1>スロットカー対決！ あなた vs BOT</h1>

<div id="track">
  <div id="finish">🏁</div>
  <div id="player-car" class="car">🚗</div>
  <div id="bot-car" class="car">🤖</div>
</div>

<div id="info">準備OK！　スタートボタンを押してね</div>

<button id="startBtn">スタート！</button>
<button id="accelBtn" disabled>加速！</button>
<button id="resetBtn" class="hidden">もう一回</button>

<script>
const playerCar = document.getElementById('player-car');
const botCar    = document.getElementById('bot-car');
const info      = document.getElementById('info');
const startBtn  = document.getElementById('startBtn');
const accelBtn  = document.getElementById('accelBtn');
const resetBtn  = document.getElementById('resetBtn');

const TRACK_WIDTH = document.getElementById('track').clientWidth - 80; // 車の幅を引く
const FINISH_LINE = TRACK_WIDTH;

let playerPos = 0;
let botPos    = 0;
let gameRunning = false;
let playerSpeed = 0;
let botSpeed    = 0;
let lastTime    = 0;

function resetGame() {
  playerPos = 0;
  botPos    = 0;
  playerSpeed = 0;
  botSpeed    = 0;
  playerCar.style.left = '0px';
  botCar.style.left    = '0px';
  info.textContent = "準備OK！　スタートボタンを押してね";
  startBtn.disabled = false;
  accelBtn.disabled = true;
  resetBtn.classList.add('hidden');
  gameRunning = false;
}

function updatePositions(timestamp) {
  if (!gameRunning) return;

  if (!lastTime) lastTime = timestamp;
  const dt = (timestamp - lastTime) / 1000; // 秒
  lastTime = timestamp;

  // プレイヤーの速度変化（摩擦あり）
  playerSpeed *= 0.96;           // 自然減速
  playerPos += playerSpeed * dt * 1800;

  // Botはちょっと賢い（たまにミスする）
  if (Math.random() < 0.97) {
    botSpeed += (Math.random() * 0.8 + 0.9); // 0.9〜1.7くらいの加速
  } else {
    botSpeed *= 0.4; // たまに大きく減速（ミス）
  }
  botSpeed = Math.min(botSpeed, 28); // 上限
  botPos += botSpeed * dt * 1400;

  // 位置制限
  playerPos = Math.min(playerPos, FINISH_LINE + 30);
  botPos    = Math.min(botPos,    FINISH_LINE + 30);

  playerCar.style.left = playerPos + 'px';
  botCar.style.left    = botPos + 'px';

  // 勝敗判定
  if (playerPos >= FINISH_LINE || botPos >= FINISH_LINE) {
    gameRunning = false;
    accelBtn.disabled = true;

    if (playerPos >= FINISH_LINE && botPos < FINISH_LINE) {
      info.textContent = "🎉 あなたの勝ち！　すごい！";
      playerCar.innerHTML = "🚗✨";
    } else if (botPos >= FINISH_LINE && playerPos < FINISH_LINE) {
      info.textContent = "残念… BOTの勝ち😢";
      botCar.innerHTML = "🤖🏆";
    } else {
      info.textContent = "ドロー！　すごい接戦！";
    }

    resetBtn.classList.remove('hidden');
    return;
  }

  requestAnimationFrame(updatePositions);
}

startBtn.onclick = () => {
  if (gameRunning) return;
  resetGame(); // 念のため
  gameRunning = true;
  playerSpeed = 0;
  botSpeed = 3 + Math.random() * 4; // Botに少しハンデ

  info.textContent = "レース開始！　タイミングよく「加速！」を押そう！";
  startBtn.disabled = true;
  accelBtn.disabled = false;

  lastTime = 0;
  requestAnimationFrame(updatePositions);
};

accelBtn.onclick = () => {
  if (!gameRunning) return;
  playerSpeed += 11 + Math.random() * 5; // 11〜16くらいの加速
  playerSpeed = Math.min(playerSpeed, 32); // 上限
  info.textContent = "ブースト！　現在の速度：" + Math.floor(playerSpeed);
};

resetBtn.onclick = resetGame;

// 初回リセット
resetGame();
</script>

</body>
</html>
