<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ミニスロットカー（タッチ対応版）</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
      touch-action: none;          /* ピンチズーム・スクロール防止 */
      -webkit-user-select: none;
      user-select: none;
    }
    #container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #game {
      position: relative;
      width: 100%;
      max-width: 500px;
      height: 80vh;
      max-height: 700px;
      background: #333;
      border: 3px solid #666;
      overflow: hidden;
      touch-action: none;
      box-shadow: 0 0 30px rgba(0,0,0,0.9);
    }
    #road {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        #222 0px, #222 50px,
        #444 50px, #444 100px
      );
      transition: transform 0.1s linear;
    }
    .car {
      position: absolute;
      width: 50px;
      height: 28px;
      border-radius: 6px;
      transition: left 0.08s linear, transform 0.1s;
      box-shadow: 0 3px 10px black;
    }
    #player {
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(to right, #ff5555, #cc0000);
    }
    #cpu {
      bottom: 60px;
      left: 30%;
      background: linear-gradient(to right, #5555ff, #0000cc);
    }
    #goal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(to bottom, #ffdd44, #ffaa00);
      text-align: center;
      line-height: 80px;
      font-size: 3rem;
      font-weight: bold;
      color: #000;
      display: none;
      z-index: 10;
    }
    #info {
      font-size: 1.6rem;
      margin: 10px;
      text-shadow: 0 0 10px black;
    }
    button {
      padding: 15px 40px;
      font-size: 1.4rem;
      margin: 15px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #444;
      color: white;
    }
    button:active {
      background: #666;
    }
    /* タッチエリアの視覚的ヒント（オプション） */
    .touch-zone {
      position: absolute;
      bottom: 0;
      height: 35%;
      width: 50%;
      opacity: 0.15;
      pointer-events: none;
      z-index: 5;
    }
    #left-zone  { left: 0;  background: linear-gradient(to right, #00ff88, transparent); }
    #right-zone { right: 0; background: linear-gradient(to left, #ff8800, transparent); }
  </style>
</head>
<body>

  <div id="container">
    <div id="info">残り距離: <span id="distance">3000</span>m</div>
    <div id="game">
      <div id="road"></div>
      <div id="player" class="car"></div>
      <div id="cpu" class="car"></div>
      <div id="goal">GOAL!!</div>
      <!-- タッチエリアの視覚ガイド（薄く表示） -->
      <div id="left-zone"  class="touch-zone"></div>
      <div id="right-zone" class="touch-zone"></div>
    </div>
    <button onclick="startGame()">スタート / リスタート</button>
  </div>

  <script>
    const game = document.getElementById('game');
    const player = document.getElementById('player');
    const cpu    = document.getElementById('cpu');
    const distEl = document.getElementById('distance');
    const goal   = document.getElementById('goal');

    let gameRunning = false;
    let playerX = 0;           // 相対位置（%ベースに変更）
    let playerSpeed = 0;
    let cpuSpeed = 2.8;
    let distanceLeft = 3000;
    let animationFrameId;

    const curves = [
      { start:  600, power: 1.2 },
      { start: 1200, power: 1.8 },
      { start: 1800, power: 1.4 },
      { start: 2400, power: 2.2 },
    ];

    // タッチ制御用
    let accelerating = false;
    let decelerating = false;

    function getGameWidth() {
      return game.clientWidth;
    }

    function update() {
      if (!gameRunning) return;

      // タッチ/キー操作
      if (accelerating || keys.ArrowRight || keys.d) {
        playerSpeed += 0.22;
      }
      if (decelerating || keys.ArrowLeft || keys.a) {
        playerSpeed -= 0.22;
      }

      playerSpeed *= 0.955; // 摩擦
      playerSpeed = Math.max(-5, Math.min(7, playerSpeed));

      playerX += playerSpeed * 0.4; // 左右移動幅を調整

      const maxX = getGameWidth() - player.offsetWidth;
      if (playerX < 30 || playerX > maxX - 30) {
        playerSpeed *= 0.38; // 壁で大減速
      }
      playerX = Math.max(30, Math.min(maxX - 30, playerX));

      player.style.left = playerX + 'px';

      // CPUの簡易AI
      let cpuAccel = 0.14;
      const nearCurve = curves.some(c => Math.abs(distanceLeft - c.start) < 350);
      if (nearCurve) cpuAccel *= 0.65;

      cpuSpeed += (Math.random() * 0.05 - 0.025) + cpuAccel * 0.7;
      cpuSpeed = Math.max(1.5, Math.min(4.5, cpuSpeed));

      distanceLeft -= (playerSpeed + cpuSpeed) * 0.9;
      distEl.textContent = Math.max(0, Math.floor(distanceLeft));

      // カーブ演出
      let curveOffset = 0;
      for (let c of curves) {
        if (distanceLeft < c.start + 250 && distanceLeft > c.start - 450) {
          const t = (distanceLeft - (c.start - 450)) / 700;
          curveOffset = Math.sin(t * Math.PI * 2) * 35 * c.power;
        }
      }
      document.getElementById('road').style.transform = `translateX(${curveOffset}px)`;

      // ゴール
      if (distanceLeft <= 0) {
        gameRunning = false;
        goal.style.display = 'block';
        goal.textContent = playerSpeed > cpuSpeed ? "YOU WIN!!" : "CPU WIN...";
        goal.style.color = playerSpeed > cpuSpeed ? "#0f0" : "#f44";
      }

      animationFrameId = requestAnimationFrame(update);
    }

    const keys = {};
    window.addEventListener('keydown', e => { if (['ArrowLeft','ArrowRight','a','d'].includes(e.key)) e.preventDefault(); keys[e.key] = true; });
    window.addEventListener('keyup',   e => keys[e.key] = false);

    // タッチイベント（画面左半分＝減速、右半分＝加速）
    function handleTouch(e) {
      e.preventDefault();
      accelerating = false;
      decelerating = false;

      for (let touch of e.touches) {
        const rect = game.getBoundingClientRect();
        const tx = touch.clientX - rect.left;
        if (tx < rect.width / 2) {
          decelerating = true;
        } else {
          accelerating = true;
        }
      }
    }

    game.addEventListener('touchstart', handleTouch, { passive: false });
    game.addEventListener('touchmove',  handleTouch, { passive: false });
    game.addEventListener('touchend',   e => { e.preventDefault(); accelerating = false; decelerating = false; });
    game.addEventListener('touchcancel', e => { e.preventDefault(); accelerating = false; decelerating = false; });

    function startGame() {
      cancelAnimationFrame(animationFrameId);
      gameRunning = true;
      playerX = (getGameWidth() - player.offsetWidth) / 2;
      player.style.left = playerX + 'px';
      playerSpeed = 0;
      cpuSpeed = 2.8;
      distanceLeft = 3000;
      cpu.style.left = (getGameWidth() * 0.3) + 'px';
      goal.style.display = 'none';
      update();
    }

    // 画面サイズが変わったら再調整
    window.addEventListener('resize', () => {
      if (gameRunning) playerX = Math.min(playerX, getGameWidth() - player.offsetWidth);
    });

    // 初回はボタン待ち
  </script>
</body>
</html>
