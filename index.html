<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ヒカマニ画像データベース</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      padding: 8px;
    }
    .card {
      background: #1f2937;
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.25s ease;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .modal-content {
      background: #1f2937;
      border-radius: 16px;
      max-width: 90vw;
      max-height: 90vh;
      overflow: auto;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <div class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
    <h1 class="text-4xl sm:text-5xl font-bold text-center mb-4 text-orange-400">
      ヒカマニ画像データベース
    </h1>
    <p class="text-center text-xl text-gray-300 mb-10">
      全てのヒカマニ画像を、ここで
    </p>

    <!-- 検索 -->
    <div class="mb-10">
      <input 
        id="searchInput"
        type="text"
        placeholder="キーワード検索（例：驚く セイキン アナル ウホッ）"
        class="w-full p-4 text-lg bg-gray-800 border border-gray-700 rounded-xl focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/30"
      />
    </div>

    <!-- お気に入りエリア -->
    <section class="mb-16">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-3xl font-bold flex items-center gap-3">
          <span>❤️ お気に入り</span>
          <span id="favCount" class="text-xl text-gray-400">(0)</span>
        </h2>
        <button 
          onclick="clearFavorites()"
          class="px-4 py-2 bg-red-700 hover:bg-red-600 rounded-lg text-sm font-medium transition"
        >
          すべてクリア
        </button>
      </div>
      <div id="favoritesGallery" class="gallery"></div>
    </section>

    <!-- メインギャラリー -->
    <div id="mainGallery" class="gallery"></div>
  </div>

  <!-- 画像モーダル -->
  <div id="modal" class="modal">
    <div class="modal-content p-6 sm:p-8 relative">
      <button 
        onclick="closeModal()"
        class="absolute top-4 right-4 text-4xl text-gray-400 hover:text-white transition"
      >×</button>

      <img id="modalImg" class="w-full max-h-[60vh] object-contain rounded-xl mb-6 mx-auto" alt="拡大画像">

      <h3 id="modalTitle" class="text-2xl font-bold mb-3"></h3>
      <p id="modalDesc" class="text-gray-300 mb-4"></p>
      
      <div id="modalTags" class="flex flex-wrap gap-2 mb-6"></div>

      <div class="flex flex-col sm:flex-row gap-4">
        <button 
          onclick="downloadCurrent()"
          class="flex-1 bg-orange-600 hover:bg-orange-500 py-4 rounded-xl font-bold text-lg transition"
        >
          ⬇️ ダウンロード
        </button>
        <button 
          id="favBtn"
          onclick="toggleFavoriteCurrent()"
          class="flex-1 bg-pink-600 hover:bg-pink-500 py-4 rounded-xl font-bold text-lg transition"
        >
          ❤️ お気に入りに追加
        </button>
      </div>
    </div>
  </div>

  <script>
    // =============================================================
    //          ★ データ追加はここだけ編集してください ★
    // =============================================================
    // やり方：
    //   1. 下の配列に {} をコピペして追加
    //   2. id は連番でOK（重複しなければ何でも可）
    //   3. url は https://github.com/... ?raw=true 形式 または相対パス images/xxx.jpg
    //   4. タグは好きなだけ追加可能

    const hikamaniItems = [

      // ───────────── 既存のデータ（変更なし） ─────────────

      {
        id: 1,
        title: "存在しないヒカマニ　ママ",
        tags: ["ママ", "ヒカキン", "ヒカマニ"],
        desc: "存在しないヒカマニbot",
        url: "https://github.com/soulkin19/hikamer_photo/blob/main/IMG_0150.jpeg?raw=true"
      },

      {
        id: 2,
        title: "質問　ヒカキン",
        tags: ["机", "ヒカキン", "語録"],
        desc: "言っちゃいそうな瞬間",
        url: "https://github.com/soulkin19/hikamer_photo/blob/main/IMG_0118.jpeg?raw=true"
      },

      {
        id: 3,
        title: "閉店",
        tags: ["みそきん", "編集ミス", "閉店"],
        desc: "開店直後に閉店",
        url: "https://github.com/soulkin19/hikamer_photo/blob/main/IMG_0112.jpeg?raw=true"
      },

      {
        id: 4,
        title: "ヒカキンのお腹",
        tags: ["ヒカキン", "妊娠", "お腹"],
        desc: "ヒカキンのお腹",
        url: "IMG_0095.jpeg"
      },
    
      {
        id: 5,
        title: "泣くヒカキン",
        tags: ["ヒカキン", "泣く", "マイクラ"],
        desc: "マイクラ",
        url: "IMG_0094.jpeg"
      },

      {
        id: 6,
        title: "変顔",
        tags: ["ヒカキン", "変顔", "食品ロス"],
        desc: "変顔するヒカキン",
        url: "IMG_0091.png"
      },

      // ───────────── id:7〜50 の空テンプレート（ここから追加してください） ─────────────
      // 必要な分だけ title / tags / desc / url を埋めてください

      { id: 7, title: "歯磨きするヒカキン", tags: ["歯磨き"], desc: "歯磨きする", url: "IMG_0023.jpeg" },
      { id: 8, title: "キレる", tags: ["ガチギレ","赤"], desc: "切れているヒカキン", url: "IMG_0010.jpeg" },
      { id: 9, title: "SAENS", tags: ["SAENSキン"], desc: "saensキン", url: "IMG_0158.jpeg" },
      { id: 10, title: "馬鹿", tags: ["バカ"], desc: "バカ", url: "IMG_0160.jpeg" },
      { id: 11, title: "", tags: [], desc: "", url: "" },
      { id: 12, title: "", tags: [], desc: "", url: "" },
      { id: 13, title: "", tags: [], desc: "", url: "" },
      { id: 14, title: "", tags: [], desc: "", url: "" },
      { id: 15, title: "", tags: [], desc: "", url: "" },
      { id: 16, title: "", tags: [], desc: "", url: "" },
      { id: 17, title: "", tags: [], desc: "", url: "" },
      { id: 18, title: "", tags: [], desc: "", url: "" },
      { id: 19, title: "", tags: [], desc: "", url: "" },
      { id: 20, title: "", tags: [], desc: "", url: "" },
      { id: 21, title: "", tags: [], desc: "", url: "" },
      { id: 22, title: "", tags: [], desc: "", url: "" },
      { id: 23, title: "", tags: [], desc: "", url: "" },
      { id: 24, title: "", tags: [], desc: "", url: "" },
      { id: 25, title: "", tags: [], desc: "", url: "" },
      { id: 26, title: "", tags: [], desc: "", url: "" },
      { id: 27, title: "", tags: [], desc: "", url: "" },
      { id: 28, title: "", tags: [], desc: "", url: "" },
      { id: 29, title: "", tags: [], desc: "", url: "" },
      { id: 30, title: "", tags: [], desc: "", url: "" },
      { id: 31, title: "", tags: [], desc: "", url: "" },
      { id: 32, title: "", tags: [], desc: "", url: "" },
      { id: 33, title: "", tags: [], desc: "", url: "" },
      { id: 34, title: "", tags: [], desc: "", url: "" },
      { id: 35, title: "", tags: [], desc: "", url: "" },
      { id: 36, title: "", tags: [], desc: "", url: "" },
      { id: 37, title: "", tags: [], desc: "", url: "" },
      { id: 38, title: "", tags: [], desc: "", url: "" },
      { id: 39, title: "", tags: [], desc: "", url: "" },
      { id: 40, title: "", tags: [], desc: "", url: "" },
      { id: 41, title: "", tags: [], desc: "", url: "" },
      { id: 42, title: "", tags: [], desc: "", url: "" },
      { id: 43, title: "", tags: [], desc: "", url: "" },
      { id: 44, title: "", tags: [], desc: "", url: "" },
      { id: 45, title: "", tags: [], desc: "", url: "" },
      { id: 46, title: "", tags: [], desc: "", url: "" },
      { id: 47, title: "", tags: [], desc: "", url: "" },
      { id: 48, title: "", tags: [], desc: "", url: "" },
      { id: 49, title: "", tags: [], desc: "", url: "" },
      { id: 50, title: "", tags: [], desc: "", url: "" },

    ];

    // idが抜けていた場合のフォールバック（ほぼ使わないはず）
    const database = hikamaniItems.map((item, index) => ({
      id: item.id ?? (index + 10000),
      title: item.title || "無題",
      tags: item.tags || [],
      desc: item.desc || "説明なし",
      url: item.url || ""
    }));

    // =============================================================
    //          ここから下は編集不要（ロジック部分）
    // =============================================================

    let currentItem = null;
    let favorites = JSON.parse(localStorage.getItem("hikamani_favs") || "[]");

    function renderGallery(items, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";

      if (items.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-500 col-span-full py-12">まだアイテムがありません</p>`;
        return;
      }

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <img src="${item.url}" alt="${item.title}" loading="lazy">
          <div class="p-4">
            <h4 class="font-bold mb-2">${item.title}</h4>
            <div class="flex flex-wrap gap-1">
              ${item.tags.map(t => `<span class="text-xs bg-gray-700 px-2 py-0.5 rounded">${t}</span>`).join("")}
            </div>
          </div>
        `;
        div.onclick = () => openModal(item);
        container.appendChild(div);
      });
    }

    document.getElementById("searchInput").addEventListener("input", e => {
      const q = e.target.value.toLowerCase().trim();
      if (!q) {
        renderGallery(database, "mainGallery");
        return;
      }

      const filtered = database.filter(item =>
        item.title.toLowerCase().includes(q) ||
        item.desc.toLowerCase().includes(q) ||
        item.tags.some(t => t.toLowerCase().includes(q))
      );

      renderGallery(filtered, "mainGallery");
    });

    function openModal(item) {
      currentItem = item;
      document.getElementById("modal").style.display = "flex";
      document.getElementById("modalImg").src = item.url;
      document.getElementById("modalImg").alt = item.title;
      document.getElementById("modalTitle").textContent = item.title;
      document.getElementById("modalDesc").textContent = item.desc;

      const tagsDiv = document.getElementById("modalTags");
      tagsDiv.innerHTML = item.tags
        .map(t => `<span class="bg-gray-700 px-3 py-1 rounded text-sm">${t}</span>`)
        .join("");

      updateFavoriteButton();
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
      currentItem = null;
    }

    function isFavorite(id) {
      return favorites.some(f => f.id === id);
    }

    function toggleFavorite(item) {
      const idx = favorites.findIndex(f => f.id === item.id);
      if (idx === -1) {
        favorites.push(item);
      } else {
        favorites.splice(idx, 1);
      }
      localStorage.setItem("hikamani_favs", JSON.stringify(favorites));
      updateFavoriteButton();
      renderGallery(favorites, "favoritesGallery");
      document.getElementById("favCount").textContent = `(${favorites.length})`;
    }

    function toggleFavoriteCurrent() {
      if (currentItem) toggleFavorite(currentItem);
    }

    function updateFavoriteButton() {
      if (!currentItem) return;
      const btn = document.getElementById("favBtn");
      const isFav = isFavorite(currentItem.id);
      btn.textContent = isFav ? "❤️ お気に入りから削除" : "❤️ お気に入りに追加";
      btn.classList.toggle("bg-pink-600", !isFav);
      btn.classList.toggle("hover:bg-pink-500", !isFav);
      btn.classList.toggle("bg-red-600", isFav);
      btn.classList.toggle("hover:bg-red-500", isFav);
    }

    function clearFavorites() {
      if (!confirm("お気に入りをすべて削除しますか？")) return;
      favorites = [];
      localStorage.removeItem("hikamani_favs");
      renderGallery([], "favoritesGallery");
      document.getElementById("favCount").textContent = "(0)";
      if (currentItem) updateFavoriteButton();
    }

    function downloadCurrent() {
      if (!currentItem) return;
      const a = document.createElement("a");
      a.href = currentItem.url;
      a.download = `${currentItem.title.replace(/[\s/\\?%*:|"<>]/g, "_")}.jpg`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // 初期表示
    renderGallery(database, "mainGallery");
    renderGallery(favorites, "favoritesGallery");
    document.getElementById("favCount").textContent = `(${favorites.length})`;
  </script>
</body>
</html>
